<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodScoop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #F5EFE6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #FFFFFF;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
      color: #3E2723;
    }

    p {
      color: #6D4C41;
      font-size: 14px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #D7CCC8;
    }

    button {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background-color: #6D4C41;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #4E342E;
    }

    .result {
      margin-top: 20px;
      font-weight: bold;
      color: #3E2723;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>MoodScoop 🍦</h1>
    <p>พิมพ์อารมณ์วันนี้ของคุณ</p>

    <input type="text" id="moodInput" placeholder="เช่น เหนื่อย / ดีใจ / เศร้า" />
    <button onclick="showIcecream()">ดูไอศกรีมที่เหมาะกับคุณ</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function showIcecream() {
      const mood = document.getElementById("moodInput").value;
      const result = document.getElementById("result");

      if (mood.includes("เหนื่อย")) {
        result.innerHTML = "🍫 Chocolate – เติมพลังให้ชีวิต!";
      } 
      else if (mood.includes("ดีใจ")) {
        result.innerHTML = "🍓 Strawberry – หวานสดใสเหมือนคุณ!";
      } 
      else if (mood.includes("เศร้า")) {
        result.innerHTML = "🍦 Vanilla – อบอุ่นและปลอบใจ";
      } 
      else {
        result.innerHTML = "🍨 Special Scoop – คุณพิเศษเกินจะจำกัดรสเดียว!";
      }
    }
  </script>

</body>
</html>
